<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8"/>
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0"/>
        <title> Movie Watch List Hub </title>
        <link rel = "stylesheet" href="css/style.css"/>
        <script type = "module" src = "js/app.js"></script>

    </head>
    <body class = "index-body">
        <!--Navigation bar-->
        <nav class = "nav-bar">
            <!--Logo-->
            <div class ="logo">
                <img src = "assets/logo.jpg" alt ="logo" class = "logo-image"/>
                <h1> Watch List Hub </h1>
            </div>
            <input type = "text" placeholder = "Search" class="search-bar"/>
            <a href = "index.html" class = "home-button">
                <img src = "assets/Home.png" alt = "home-logo" class = "home-image"/>
                Home 
            </a>
            <a href = "createwatchlist.html" class = "create-watchlist-button">
                + Create Watch List
            </a>
            <div class = "divider"></div>
            <div class = "watchlist-header"> My Watch List </div>
            <div id = "created-watchlist">
                <!-- New watchlist items will be dynamically added here -->
            </div>
            <!--Vẽ icon cho vui nhộn-->
            <img src="assets/smile.png" alt="Smiley Face" class="smile-icon"/>
        </nav>

        <main class = "movie-details-content">
            <div class = "movie-details-header">
                <h2> Movie Details </h2>
                <p> Explore detailed information about the movie, including synopsis, cast, and more. </p>
            </div>

            <div id = "movie-details-container" class = "movie-details-container">
                <!-- Movie details will be dynamically added here -->
            </div>
        </main>
        
    </body>
</html>
