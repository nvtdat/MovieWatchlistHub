<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8"/>
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0"/>
        <title> Movie Watch List Hub </title>
        <link rel = "stylesheet" href="css/style.css"/>
        <script type = "module" src = "js/app.js"></script>
    </head>
    <body class = "watchlist-body">
        <!--Navigation bar-->
        <nav class = "nav-bar">
            <!--Logo-->
            <div class ="logo">
                <img src = "assets/logo.jpg" alt ="logo" class = "logo-image"/>
                <h1> Watch List Hub </h1>
            </div>
            <input type = "text" placeholder = "Search" class="search-bar"/>
            <a href = "index.html" class = "home-button">
                <img src = "assets/Home.png" alt = "home-logo" class = "home-image"/>
                Home 
            </a>
            
            <a href = "createwatchlist.html" class = "create-watchlist-button">
                + Create Watch List
            </a>
            
            <div class = "divider"></div>
            <div class = "watchlist-header"> My Watch List </div>
            <div id = "created-watchlist">
                <!-- New watchlist items will be dynamically added here --> 
            </div>
            <!--Vẽ icon cho vui nhộn-->
            <img src="assets/smile.png" alt="Smiley Face" class="smile-icon"/>
        </nav>

        <header class = "watchlist-hero-section">
            <div class = "watchlist-section-header">
                <h2> My Watch List </h2>
                <p> Your personalized collection of movies to watch. </p>
                <p> Start adding movies to your watchlist by browsing our collection of popular movies on the home page. </p>
            </div>
        </header>

        <!-- Main content for watchlist-->
         <main class = "watchlist-content">
            <div class = "watchlist-container" id = "watchlist-container">
                <!-- Watchlist items will be dynamically added here -->
            </div>
        </main>
    </body>
</html>
