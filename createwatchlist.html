<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8"/>
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0"/>
        <title> Movie Watch List Hub </title>
        <link rel = "stylesheet" href="css/style.css"/>
        <script type = "module" src = "js/app.js"></script>

    </head>
    <body class = "index-body">
        <!--Navigation bar-->
        <nav class = "nav-bar">
            <!--Logo-->
            <div class ="logo">
                <img src = "assets/logo.jpg" alt ="logo" class = "logo-image"/>
                <h1> Watch List Hub </h1>
            </div>
            <input type = "text" placeholder = "Search" class="search-bar"/>
            <a href = "index.html" class = "home-button">
                <img src = "assets/Home.png" alt = "home-logo" class = "home-image"/>
                Home 
            </a>
            <!-- New code added for create watchlist button -->
            <a href = "createwatchlist.html" class = "create-watchlist-button">
                + Create Watch List
            </a>

            <div class = "divider"></div>
            <div class = "watchlist-header"> My Watch List </div>
            <div id = "created-watchlist">
                <!-- New watchlist items will be dynamically added here -->
            </div>

            <!--Vẽ icon cho vui nhộn-->
            <img src="assets/smile.png" alt="Smiley Face" class="smile-icon"/>
        </nav>

        <main class = "create-watchlist-content">
            <div class = "create-watchlist-section-header">
                <h2> Create a New Watch List </h2>
                <p> Give your watchlist a name and start adding movies to it! </p>
            </div>

            <form id="create-watchlist-form" class="watchlist-form">
                <div class="form-group">
                    <label for="watchlist-name">Name</label>
                    <input type="text" id="watchlist-name" required placeholder="Enter watchlist name...">
                </div>

                <div class="form-group">
                    <label for="watchlist-desc">Description</label>
                    <textarea id="watchlist-desc" rows="6" placeholder="Enter description..."></textarea>
                </div>

                <button type="submit" class="create-button">Create</button>
            </form>
        </main>
        
    </body>
</html>
